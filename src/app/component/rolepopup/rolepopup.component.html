<form [formGroup]="roleForm" (ngSubmit)="saveUserRole()">
    <mat-card>
        <mat-card-header>
            <h1>User Role Assignment</h1>
            </mat-card-header>
            <mat-card-content style="display: flex; flex-direction: column;">
                <mat-form-field>
                    <mat-label>Username</mat-label>
                    <input type="text" formControlName="username" matInput>
                </mat-form-field>
                 <mat-form-field >
                    <mat-label>User Role</mat-label>
                    <mat-select formControlName="role">
                        <mat-option value="{{item.code}}" *ngFor="let item of rolelist">
                        {{item.name}}
                    </mat-option>
                    </mat-select>
                </mat-form-field>
            </mat-card-content>
            <mat-card-actions style="display:flex; gap: 20px;">
                <div class="div-50">
                    <button type="submit" class="primary" mat-raised-button>Save</button>
                </div>
                <div class="div-50">
                    <button type="button" (click)="closePopup()" class="default" mat-raised-button>Cancel</button>
                </div>
            </mat-card-actions>
    </mat-card>
</form>
