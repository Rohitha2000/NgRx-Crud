<form [formGroup]="loginForm" (ngSubmit)="proceedLogin()">
    <mat-card>
        <mat-card-header>
            <h1>User Login</h1>
            </mat-card-header>
            <mat-card-content>
                <mat-form-field>
                    <mat-label>Username</mat-label>
                    <input type="text" formControlName="username" matInput>
                </mat-form-field>
                 <mat-form-field >
                    <mat-label>Password</mat-label>
                    <input type="password" formControlName="password" matInput>
                </mat-form-field>
            </mat-card-content>
            <mat-card-actions>
                <div class="div-50">
                    <button type="submit" class="primary" mat-raised-button>Save</button>
                </div>
                <div class="div-50">
                    <button type="button" (click)="resetLogin()" class="default" mat-raised-button>Cancel</button>
                </div>
                    
            </mat-card-actions>
            <div class="div-50 user-link"><a routerLink="/register" >New User?</a></div>
    </mat-card>
</form>
